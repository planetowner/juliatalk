services:
  postgres:
    image: postgres:16-alpine
    container_name: juliatalk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: juliatalk
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - juliatalk-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d juliatalk"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  juliatalk-postgres-data:
